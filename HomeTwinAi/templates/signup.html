<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | HomeTwin AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page night-mode" data-page="auth">
    <main class="auth-shell page-fade">
        <section class="auth-brand">
            <p class="eyebrow">HomeTwin AI</p>
            <h1>Build your personal smart home digital twin.</h1>
            <p>Choose an automation style and start with a secure SaaS-style workspace for your home intelligence.</p>
        </section>

        <form class="auth-card" method="post">
            <div>
                <p class="eyebrow">Start free</p>
                <h2>Create account</h2>
            </div>
            {% if error %}
                <p class="form-alert">{{ error }}</p>
            {% endif %}
            <label>
                Username
                <input name="username" type="text" placeholder="yourname" autocomplete="username" required>
            </label>
            <label>
                Password
                <input name="password" type="password" placeholder="minimum 4 characters" autocomplete="new-password" required>
            </label>
            <label>
                Default mode
                <select name="preference">
                    <option value="eco">Eco mode</option>
                    <option value="comfort">Comfort mode</option>
                </select>
            </label>
            <button class="primary-action ripple-button" type="submit">Create Dashboard</button>
            <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </form>
    </main>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
